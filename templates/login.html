<!DOCTYPE html>
<html lang="{{ lang }}" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VanillaTracker</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='img/logo.svg') }}">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --md-primary: #D0BCFF; --md-on-primary: #381E72;
      --md-primary-container: #4F378B; --md-on-primary-container: #EADDFF;
      --md-background: #141218; --md-on-background: #E6E0E9;
      --md-surface-container: #211F26; --md-surface-container-high: #2B2930;
      --md-outline: #938F99; --md-outline-variant: #49454F;
      --md-on-surface: #E6E0E9; --md-on-surface-variant: #CAC4D0;
      --md-error: #F2B8B5;
      --radius-sm: 8px; --radius-md: 12px; --radius-xl: 28px; --radius-full: 50px;
      --elev-3: 0 4px 8px 3px rgba(0,0,0,.15), 0 1px 3px rgba(0,0,0,.3);
      font-family: 'Lato', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--md-background); color: var(--md-on-background); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--md-surface-container); border-radius: var(--radius-xl); padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: var(--elev-3); }
    .login-logo { width: 56px; height: 56px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; overflow: hidden; }
    .login-logo img { width: 100%; height: 100%; object-fit: contain; }
    h1 { font-size: 24px; font-weight: 400; color: var(--md-on-surface); text-align: center; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--md-on-surface-variant); text-align: center; margin-bottom: 32px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .form-group label { font-size: 12px; font-weight: 500; letter-spacing: .5px; color: var(--md-on-surface-variant); text-transform: uppercase; }
    .md3-input { background: var(--md-surface-container-high); border: 1px solid var(--md-outline); border-radius: var(--radius-sm); color: var(--md-on-surface); padding: 14px 16px; font-size: 15px; font-family: inherit; width: 100%; transition: border-color .2s; outline: none; }
    .md3-input:focus { border-color: var(--md-primary); box-shadow: 0 0 0 2px rgba(208,188,255,.2); }
    .btn-filled { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; border-radius: var(--radius-full); font-size: 15px; font-weight: 500; border: none; cursor: pointer; background: var(--md-primary); color: var(--md-on-primary); width: 100%; transition: opacity .2s; }
    .btn-filled:hover { opacity: .9; }
    .error-box { background: rgba(242,184,181,.1); border: 1px solid rgba(242,184,181,.3); border-radius: var(--radius-sm); padding: 12px 16px; color: var(--md-error); font-size: 13px; margin-bottom: 20px; }
    .lang-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .lang-lnk { font-size: 12px; font-weight: 700; letter-spacing: .5px; color: var(--md-on-surface-variant); padding: 4px 10px; border-radius: var(--radius-full); text-decoration: none; }
    .lang-lnk.active { background: var(--md-primary-container); color: var(--md-on-primary-container); }
    .lang-lnk:hover { color: var(--md-on-surface); text-decoration: none; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="{{ url_for('static', path='img/logo.svg') }}" alt="VanillaTracker">
  </div>
  <h1>VanillaTracker</h1>
  <p class="subtitle">{{ t.login_subtitle }}</p>

  <div class="lang-row">
    <a href="/lang/pl/?next={{ request.url.path }}" class="lang-lnk {% if lang == 'pl' %}active{% endif %}">PL</a>
    <a href="/lang/en/?next={{ request.url.path }}" class="lang-lnk {% if lang == 'en' %}active{% endif %}">EN</a>
  </div>

  {% if errors.__all__ %}
  <div class="error-box">{{ errors.__all__[0] }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('login-post') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    {% if request.query_params.get('next') %}
    <input type="hidden" name="next" value="{{ request.query_params.get('next') }}">
    {% endif %}

    <div class="form-group">
      <label>{{ t.login_username }}</label>
      <input type="text" name="username" class="md3-input" value="{{ username or '' }}" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>{{ t.login_password }}</label>
      <input type="password" name="password" class="md3-input" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-filled">
      <span class="material-icons-round">login</span> {{ t.login_btn }}
    </button>
  </form>
</div>
</body>
</html>
