server {
    listen 80;
    server_name vanillatracker.pl;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vanillatracker.pl;

    ssl_certificate     /etc/letsencrypt/live/vanillatracker.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vanillatracker.pl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10M;

    access_log /var/log/nginx/assets.access.log;
    error_log  /var/log/nginx/assets.error.log;

    location / {

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
